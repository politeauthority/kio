version: "3"

dotenv: [".env"]

vars:
  # Override any of these in .env (copy .env.example → .env and fill in values)
  HARBOR:
    sh: bash -c '. .env 2>/dev/null; echo "${HARBOR:-your-registry.example.com/your-org}"'
  IMAGE: "{{.HARBOR}}/kio-api"
  IMAGE_UI: "{{.HARBOR}}/kio-ui"
  VERSION:
    sh: cat VERSION
  # Home Assistant integration manifest — its "version" is kept in sync with VERSION
  # by the bump tasks (HACS/HA require a version field that matches each release).
  MANIFEST: "src/ha-integration/custom_components/kio/manifest.json"
  KIO_DIR:
    sh: bash -c '. .env 2>/dev/null; echo "${KIO_DIR:-/home/pi/kio}"'
  MQTT_HOST:
    sh: bash -c '. .env 2>/dev/null; echo "${MQTT_HOST:-192.168.1.100}"'


tasks:
  apply-dev:
    desc: Apply kio-dev k8s manifests
    cmds:
      - kubectl apply -k kubernetes-manifests/envs/dev/

  apply-prd:
    desc: Apply production k8s manifests
    cmds:
      - kubectl apply -k kubernetes-manifests/envs/prd/

  apply-stg:
    desc: Apply kio-stg k8s manifests (copies harbor-registry pull secret from kio-dev if absent)
    cmds:
      - kubectl get secret harbor-registry -n kio-stg --ignore-not-found | grep -q harbor-registry || kubectl get secret harbor-registry -n kio-dev -o json | jq 'del(.metadata.resourceVersion,.metadata.uid,.metadata.creationTimestamp,.metadata.annotations,.metadata.namespace)' | kubectl apply -n kio-stg -f -
      - kubectl apply -k kubernetes-manifests/envs/stg/

  # Non-prod builds (dev / stg) are tagged twice: a rolling tag the kustomize overlays
  # point at (dev-latest / stg-<branch>) plus an immutable per-build tag suffixed with the
  # BUILD number, so every CI-churned build is preserved in Harbor; KIO_VERSION carries the
  # +build.N metadata (reported at /_version). PRODUCTION is the exception — it's a clean
  # single SemVer tag (<version>) with no build number, since each prod release is a unique
  # patch version, not a rebuild.
  build-dev:
    desc: Build the kio-api image tagged dev-latest (linux/amd64)
    vars:
      BUILD:
        sh: cat BUILD
    cmds:
      # --load exports the image to the local docker store so the separate
      # push-dev step (docker push) finds it. Required with the docker-container
      # buildx driver; a no-op with the plain `docker` driver used in CI.
      - docker buildx build --platform linux/amd64 --target production --build-arg VERSION=dev-latest+build.{{.BUILD}} -f docker/Dockerfile.api -t {{.IMAGE}}:dev-latest -t {{.IMAGE}}:dev-build.{{.BUILD}} --load .

  build-prd:
    desc: Build the kio-api image tagged with the current version (linux/amd64)
    cmds:
      # Production images carry a clean SemVer tag only — no build number. Build
      # numbers are a non-prod (dev/stg) concept for CI-churned rebuilds.
      # --load so the separate push-prd step finds the image locally (required
      # with the docker-container buildx driver; no-op with the docker driver).
      - docker buildx build --platform linux/amd64 --target production --build-arg VERSION={{.VERSION}} -f docker/Dockerfile.api -t {{.IMAGE}}:{{.VERSION}} --load .

  build-stg:
    desc: "Build the kio-api staging image — includes the test suite (usage: task build-stg BRANCH=feat/my-feature)"
    vars:
      BRANCH: '{{.BRANCH | default "unknown"}}'
      TAG:
        sh: "echo stg-{{.BRANCH}} | tr '/' '-'"
      BUILD:
        sh: cat BUILD
    cmds:
      # Staging uses the `test` target so the deployed image carries pytest + the
      # test suite (run them in-cluster with `kubectl exec`). Production uses
      # `--target production`, which excludes tests and dev tooling.
      # --load exports the image to the local docker store so the separate
      # push-stg step (docker push) finds it. Required with the docker-container
      # buildx driver (which keeps results in the build cache otherwise); a no-op
      # with the plain `docker` driver used in CI.
      - docker buildx build --platform linux/amd64 --target test --build-arg VERSION={{.BRANCH}}+build.{{.BUILD}} -f docker/Dockerfile.api -t {{.IMAGE}}:{{.TAG}} -t {{.IMAGE}}:{{.TAG}}-build.{{.BUILD}} --load .

  build-ui-dev:
    desc: Build the kio-ui image tagged dev-latest (linux/amd64)
    vars:
      BUILD:
        sh: cat BUILD
    cmds:
      # --load so push-ui-dev finds the image locally (docker-container driver).
      - docker buildx build --platform linux/amd64 -f docker/Dockerfile.ui -t {{.IMAGE_UI}}:dev-latest -t {{.IMAGE_UI}}:dev-build.{{.BUILD}} --load .

  build-ui-prd:
    desc: Build the kio-ui image tagged with the current version (linux/amd64)
    cmds:
      # --load so push-ui-prd finds the image locally (docker-container driver).
      - docker buildx build --platform linux/amd64 -f docker/Dockerfile.ui -t {{.IMAGE_UI}}:{{.VERSION}} --load .

  build-ui-stg:
    desc: "Build the kio-ui staging image with branch banner (usage: task build-ui-stg BRANCH=feat/my-feature)"
    vars:
      BRANCH: '{{.BRANCH | default "unknown"}}'
      TAG:
        sh: "echo stg-{{.BRANCH}} | tr '/' '-'"
      BUILD:
        sh: cat BUILD
    cmds:
      # --load so the separate push-ui-stg step finds the image locally (see
      # build-stg). Required for the docker-container buildx driver; no-op in CI.
      - docker buildx build --platform linux/amd64 --build-arg KIO_BRANCH={{.BRANCH}} -f docker/Dockerfile.ui -t {{.IMAGE_UI}}:{{.TAG}} -t {{.IMAGE_UI}}:{{.TAG}}-build.{{.BUILD}} --load .

  test:e2e:
    desc: "Run all e2e tests (API + UI) — set KIO_API_URL, KIO_UI_URL, KIO_USERNAME, KIO_PASSWORD"
    dir: tests/e2e
    cmds:
      - task: test:e2e:api
      - task: test:e2e:ui

  test:e2e:api:
    desc: "Run API e2e tests against a live environment (pass --env=dev|stg|prd via CLI_ARGS)"
    dir: tests/e2e
    cmds:
      - uv run pytest api/ -v {{.CLI_ARGS}}

  test:e2e:ui:
    desc: "Run UI e2e tests (Playwright) against a live environment"
    dir: tests/e2e
    cmds:
      - uv run pytest ui/ -v {{.CLI_ARGS}}

  test:e2e:install:
    desc: Install e2e test dependencies (run once after checkout)
    dir: tests/e2e
    cmds:
      - uv sync
      - uv run playwright install chromium

  bump:major:
    desc: Bump major version (0.1.0 -> 1.0.0)
    cmds:
      - python3 -c "v=open('VERSION').read().strip().split('.'); v[0]=str(int(v[0])+1); v[1]='0'; v[2]='0'; open('VERSION','w').write('.'.join(v)+'\n')"
      - task: sync:manifest-version
      - echo "-> v$(cat VERSION)"

  bump:minor:
    desc: Bump minor version (0.1.0 -> 0.2.0)
    cmds:
      - python3 -c "v=open('VERSION').read().strip().split('.'); v[1]=str(int(v[1])+1); v[2]='0'; open('VERSION','w').write('.'.join(v)+'\n')"
      - task: sync:manifest-version
      - echo "-> v$(cat VERSION)"

  bump:patch:
    desc: Bump patch version (0.1.0 -> 0.1.1)
    cmds:
      - python3 -c "v=open('VERSION').read().strip().split('.'); v[2]=str(int(v[2])+1); open('VERSION','w').write('.'.join(v)+'\n')"
      - task: sync:manifest-version
      - echo "-> v$(cat VERSION)"

  sync:manifest-version:
    desc: Sync the HA integration manifest.json "version" to the current VERSION file
    cmds:
      - python3 -c "import json; v=open('VERSION').read().strip(); p='{{.MANIFEST}}'; m=json.load(open(p)); m['version']=v; open(p,'w').write(json.dumps(m, indent=2)+'\n')"
      - echo "-> manifest {{.MANIFEST}} version $(cat VERSION)"

  bump:build:
    desc: Increment the monotonic build number (BUILD file). Run once per release.
    cmds:
      - python3 -c "n=int(open('BUILD').read().strip() or 0)+1; open('BUILD','w').write(str(n)+'\n')"
      - echo "-> build $(cat BUILD)"

  test:api:
    desc: Run API unit tests
    dir: src/api
    cmds:
      - uv run pytest {{.CLI_ARGS}}

  build-test:api:
    desc: Build the kio-api test image (runtime + dev deps + tests)
    cmds:
      - docker buildx build --load --platform linux/amd64 --target test -f docker/Dockerfile.api -t {{.IMAGE}}:test .

  test:api:docker:
    desc: "Build the test image and run the API unit tests inside it (mirrors prod runtime)"
    cmds:
      - task: build-test:api
      - docker run --rm {{.IMAGE}}:test pytest -q {{.CLI_ARGS}}

  dev:migrate:
    desc: Run Alembic migrations to head inside the running dev API container
    cmds:
      - docker compose -f docker/docker-compose.yml --env-file docker/.env exec api alembic upgrade head

  dev:api:
    desc: Run the API in Docker (requires port-forward:postgres)
    cmds:
      - docker compose -f docker/docker-compose.yml --env-file docker/.env up --build

  dev:api:local:
    desc: Run the API directly on the host (requires port-forward:postgres)
    dir: src/api
    cmds:
      - DATABASE_URL=$(sed 's|host\.docker\.internal|localhost|g' ../.env | grep DATABASE_URL | cut -d= -f2-) .venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  dev:ui:
    desc: Run the Vue frontend dev server
    dir: src/ui
    cmds:
      - npm run dev

  git-tag:
    desc: Commit the version + build stamp and (re)create the release tag for the current version
    vars:
      BUILD:
        sh: cat BUILD
    cmds:
      - git add VERSION BUILD kubernetes-manifests/envs/prd/kustomization.yaml
      # Tolerate a no-op commit so re-running a release doesn't abort here.
      - git diff --cached --quiet || git commit -m "release v{{.VERSION}} (build {{.BUILD}})"
      # -f so re-releasing a version (a new build of the same VERSION) moves the
      # v{VERSION} tag to the latest build instead of failing "tag already exists".
      # The dashboard agent-updater points nodes at this tag, so it must track the
      # newest deployed build of the version.
      - git tag -f -a "v{{.VERSION}}" -m "Release v{{.VERSION}} (build {{.BUILD}})"
      - 'echo "Tagged v{{.VERSION}} build {{.BUILD}} -- push with git push origin main && git push --force origin v{{.VERSION}}"'

  ha:deploy:
    desc: Deploy the kio Home Assistant integration and restart HA core
    cmds:
      # Drop local bytecode so scp doesn't ship __pycache__ to the host.
      - find src/ha-integration/custom_components/kio -name __pycache__ -type d -exec rm -rf {} + 2>/dev/null || true
      # Wipe + recreate the remote dir so files removed locally (e.g. a dropped
      # platform) are also gone on the host. HA OS has no rsync, so this is the
      # portable way to get --delete semantics with plain ssh/scp.
      - ssh home-assistant "rm -rf /config/custom_components/kio && mkdir -p /config/custom_components/kio"
      - scp -r src/ha-integration/custom_components/kio/. home-assistant:/config/custom_components/kio/
      - ssh home-assistant "ha core restart"
      - echo "Deployed kio integration to Home Assistant"

  ha:test:
    desc: Run the HA integration test suite locally (no deploy)
    dir: src/ha-integration
    cmds:
      - uv run --with-requirements requirements_test.txt pytest -q

  ha:watch:
    desc: Auto-deploy the HA integration whenever a source file changes (needs watchexec)
    cmds:
      - watchexec -w src/ha-integration/custom_components/kio -e py,json,yaml --debounce 500ms -- task ha:deploy

  kio-1:deploy:
    desc: Deploy pi-agent to kio-1 and restart the agent service
    cmds:
      - ssh kio-1 "mkdir -p {{.KIO_DIR}}/pi-agent"
      - scp -r src/pi-agent/. kio-1:{{.KIO_DIR}}/pi-agent && scp VERSION kio-1:{{.KIO_DIR}}/pi-agent/VERSION
      - ssh kio-1 "cp {{.KIO_DIR}}/pi-agent/agent.py {{.KIO_DIR}}/pi-agent/VERSION {{.KIO_DIR}}/pi-agent/requirements.txt /opt/kio-agent/ && rm -rf /opt/kio-agent/kio_agent && cp -r {{.KIO_DIR}}/pi-agent/kio_agent /opt/kio-agent/ && rm -rf /opt/kio-agent/kio_agent/__pycache__"
      - ssh kio-1 "/opt/kio-agent/venv/bin/pip install -q -r /opt/kio-agent/requirements.txt"
      - ssh kio-1 "printf 'pkill wf-panel-pi\nunclutter-xfixes --timeout 1 &\n/opt/kio-agent/browser-start\n' > /home/pi/.config/labwc/autostart && chmod +x /home/pi/.config/labwc/autostart"
      - ssh kio-1 "sudo systemctl restart kio-agent"

  kio-1:dev:
    desc: Push dev config to kio-1 and restart the agent
    cmds:
      - scp configs/agents/kio-1-kiosk.dev.yaml kio-1:/etc/kio/kiosk.yaml
      - ssh kio-1 "sudo systemctl restart kio-agent"
      - echo "kio-1 -> dev"

  kio-1:logs:
    desc: Stream agent logs from kio-1
    cmds:
      - ssh kio-1 "journalctl -fu kio-agent"

  kio-1:prd:
    desc: Push prod config to kio-1 and restart the agent
    cmds:
      - scp configs/agents/kio-1-kiosk.prd.yaml kio-1:/etc/kio/kiosk.yaml
      - ssh kio-1 "sudo systemctl restart kio-agent"
      - echo "kio-1 -> prd"

  kio-1:release-prd:
    desc: Deploy current agent files to kio-1 and switch to prod config
    cmds:
      - task: kio-1:deploy
      - task: kio-1:prd

  kio-1:update:
    desc: Update kio-1 from git — node pulls main from GitHub and reinstalls (keeps config)
    cmds:
      - task: _kio:update
        vars: {HOST: kio-1}

  # ---------------------------------------------------------------------------
  # Internal, variabilized kio node tasks. The per-node entrypoints below call
  # these with HOST/CONFIG so every node stays in lockstep — only the hostname
  # and the config file copied over differ between nodes.
  # ---------------------------------------------------------------------------
  # Shared install: pull main, layer the current local source over the checkout
  # (reset --hard would otherwise revert to committed main), then run setup.sh —
  # the idempotent installer that repairs ownership, installs the agent + venv,
  # writes hosts/sudoers/service/autostart, and restarts. CONFIG is optional: when
  # set, setup.sh also writes that kiosk config; when empty, it keeps the node's
  # existing /etc/kio/kiosk.yaml. `ssh -t` lets nodes that need a sudo password
  # prompt for it when you run the task.
  _kio:install:
    internal: true
    cmds:
      - scp -r src/pi-agent/. {{.HOST}}:/tmp/kio-deploy
      - scp VERSION {{.HOST}}:/tmp/kio-deploy/VERSION
      - "{{if .CONFIG}}scp {{.CONFIG}} {{.HOST}}:/tmp/kio-setup-config.yaml{{else}}true{{end}}"
      - ssh -t {{.HOST}} "sudo bash /tmp/kio-deploy/setup.sh --local --allow-http {{if .CONFIG}}--config /tmp/kio-setup-config.yaml{{end}}"
      - "{{if .CONFIG}}ssh {{.HOST}} 'rm -f /tmp/kio-setup-config.yaml'{{else}}true{{end}}"
      - ssh {{.HOST}} "rm -rf /tmp/kio-deploy"

  _kio:config:
    internal: true
    cmds:
      - scp {{.CONFIG}} {{.HOST}}:/etc/kio/kiosk.yaml
      - ssh {{.HOST}} "sudo systemctl restart kio-agent"
      - echo "{{.HOST}} -> {{.CONFIG}}"

  _kio:sync:
    internal: true
    desc: Copy local pi-agent source to the node, push config, restart agent
    cmds:
      - scp src/pi-agent/agent.py src/pi-agent/requirements.txt {{.HOST}}:/opt/kio-agent/
      - scp -r src/pi-agent/scripts/. {{.HOST}}:/opt/kio-agent/
      # agent.py is a shim; sync the kio_agent package too, wiping the old copy
      # first so renamed/removed modules don't linger on the node.
      - ssh {{.HOST}} "rm -rf /opt/kio-agent/kio_agent"
      - scp -r src/pi-agent/kio_agent {{.HOST}}:/opt/kio-agent/
      - ssh {{.HOST}} "rm -rf /opt/kio-agent/kio_agent/__pycache__"
      - scp {{.CONFIG}} {{.HOST}}:/etc/kio/kiosk.yaml
      - ssh {{.HOST}} "sudo systemctl restart kio-agent"
      - echo "{{.HOST}} -> synced agent + {{.CONFIG}}"

  # Update a node straight from git instead of from this machine's working copy.
  # The node fetches setup.sh from the published repo; setup.sh self-bootstraps
  # (clones BRANCH from GitHub into a temp dir and re-execs from there), then
  # reinstalls the agent from that checkout, keeping the node's existing
  # /etc/kio/kiosk.yaml. So the node tracks what's committed to git — not your
  # local edits, which is the difference from _kio:install / _kio:sync. Override
  # the branch with `task kio-N:update BRANCH=feat/x`. `ssh -t` gives it a tty so
  # a sudo password (or any setup prompt) can be answered.
  _kio:update:
    internal: true
    vars:
      BRANCH: '{{.BRANCH | default "main"}}'
    cmds:
      - ssh -t {{.HOST}} "curl -fsSL https://raw.githubusercontent.com/politeauthority/kio/{{.BRANCH}}/src/pi-agent/setup.sh | KIO_BRANCH={{.BRANCH}} KIO_ALLOW_HTTP=1 bash"
      - echo "{{.HOST}} -> updated from git ({{.BRANCH}})"

  _kio:logs:
    internal: true
    cmds:
      - ssh {{.HOST}} "journalctl -fu kio-agent"

  kio-2:setup:
    desc: First-time setup of kio-2 — clone the repo, then install with the dev config
    cmds:
      - task: _kio:install
        vars: {HOST: kio-2, CONFIG: configs/agents/kio-2-kiosk.dev.yaml}

  kio-2:deploy:
    desc: Deploy kio-2 — scp local source, run setup.sh (keeps config), restart
    cmds:
      - task: _kio:install
        vars: {HOST: kio-2}

  kio-2:update:
    desc: Update kio-2 from git — node pulls main from GitHub and reinstalls (keeps config)
    cmds:
      - task: _kio:update
        vars: {HOST: kio-2}

  kio-2:dev:
    desc: Sync pi-agent code to kio-2, push dev config, restart agent
    cmds:
      - task: _kio:sync
        vars: {HOST: kio-2, CONFIG: configs/agents/kio-2-kiosk.dev.yaml}

  kio-2:prd:
    desc: Push prod config to kio-2 and restart the agent
    cmds:
      - task: _kio:config
        vars: {HOST: kio-2, CONFIG: configs/agents/kio-2-kiosk.prd.yaml}

  kio-2:logs:
    desc: Stream agent logs from kio-2
    cmds:
      - task: _kio:logs
        vars: {HOST: kio-2}

  kio-2:release-dev:
    desc: Deploy current agent files to kio-2 and switch to dev config
    cmds:
      - task: kio-2:deploy
      - task: kio-2:dev

  kio-2:release-prd:
    desc: Deploy current agent files to kio-2 and switch to prod config
    cmds:
      - task: kio-2:deploy
      - task: kio-2:prd

  kio-3:setup:
    desc: First-time setup of kio-3 — clone the repo, then install with the dev config
    cmds:
      - task: _kio:install
        vars: {HOST: kio-3, CONFIG: configs/agents/kio-3-kiosk.dev.yaml}

  kio-3:deploy:
    desc: Deploy kio-3 — pull main, layer local source, run setup.sh (keeps config), restart
    cmds:
      - task: _kio:install
        vars: {HOST: kio-3}

  kio-3:update:
    desc: Update kio-3 from git — node pulls main from GitHub and reinstalls (keeps config)
    cmds:
      - task: _kio:update
        vars: {HOST: kio-3}

  kio-3:dev:
    desc: Push dev config to kio-3 and restart the agent
    cmds:
      - task: _kio:config
        vars: {HOST: kio-3, CONFIG: configs/agents/kio-3-kiosk.dev.yaml}

  kio-3:prd:
    desc: Push prod config to kio-3 and restart the agent (needs a prd node token)
    cmds:
      - task: _kio:config
        vars: {HOST: kio-3, CONFIG: configs/agents/kio-3-kiosk.prd.yaml}

  kio-3:logs:
    desc: Stream agent logs from kio-3
    cmds:
      - task: _kio:logs
        vars: {HOST: kio-3}

  kio-3:release-dev:
    desc: Deploy current agent files to kio-3 and switch to dev config
    cmds:
      - task: kio-3:deploy
      - task: kio-3:dev

  kio-3:release-prd:
    desc: Deploy current agent files to kio-3 and switch to prod config
    cmds:
      - task: kio-3:deploy
      - task: kio-3:prd

  mqtt:monitor:
    desc: Watch all kio MQTT messages in real time
    cmds:
      - mosquitto_sub -h {{.MQTT_HOST}} -p 1883 -t 'kio/#' -v

  port-forward:postgres:
    desc: Forward localhost:5432 to q-postgres in the cluster
    cmds:
      - kubectl port-forward -n q-postgres svc/q-postgres-rw 5432:5432

  # Non-prod push tasks send both the rolling tag and the immutable -build.N tag; the prod
  # push sends only the clean <version> tag.
  push-dev:
    desc: Push the dev API image to Harbor
    vars:
      BUILD:
        sh: cat BUILD
    cmds:
      - docker push {{.IMAGE}}:dev-latest
      - docker push {{.IMAGE}}:dev-build.{{.BUILD}}

  push-prd:
    desc: Push the versioned API image to Harbor
    cmds:
      - docker push {{.IMAGE}}:{{.VERSION}}

  push-stg:
    desc: "Push the staging API image to Harbor (usage: task push-stg BRANCH=feat/my-feature)"
    vars:
      BRANCH: '{{.BRANCH | default "unknown"}}'
      TAG:
        sh: "echo stg-{{.BRANCH}} | tr '/' '-'"
      BUILD:
        sh: cat BUILD
    cmds:
      - docker push {{.IMAGE}}:{{.TAG}}
      - docker push {{.IMAGE}}:{{.TAG}}-build.{{.BUILD}}

  push-ui-dev:
    desc: Push the dev UI image to Harbor
    vars:
      BUILD:
        sh: cat BUILD
    cmds:
      - docker push {{.IMAGE_UI}}:dev-latest
      - docker push {{.IMAGE_UI}}:dev-build.{{.BUILD}}

  push-ui-prd:
    desc: Push the versioned UI image to Harbor
    cmds:
      - docker push {{.IMAGE_UI}}:{{.VERSION}}

  push-ui-stg:
    desc: "Push the staging UI image to Harbor (usage: task push-ui-stg BRANCH=feat/my-feature)"
    vars:
      BRANCH: '{{.BRANCH | default "unknown"}}'
      TAG:
        sh: "echo stg-{{.BRANCH}} | tr '/' '-'"
      BUILD:
        sh: cat BUILD
    cmds:
      - docker push {{.IMAGE_UI}}:{{.TAG}}
      - docker push {{.IMAGE_UI}}:{{.TAG}}-build.{{.BUILD}}

  release-dev:
    desc: Build, push, and deploy API + UI to kio-dev
    cmds:
      - task: bump:build
      - task: build-dev
      - task: push-dev
      - task: build-ui-dev
      - task: push-ui-dev
      - task: apply-dev
      - task: rollout-dev

  release-prd:
    desc: "Full production release: build API + UI, push, stamp kustomization, deploy, git-tag"
    cmds:
      # No bump:build — production images are versioned by SemVer (patch), not build number.
      - task: stamp-prd
      - task: build-prd
      - task: push-prd
      - task: build-ui-prd
      - task: push-ui-prd
      - task: apply-prd
      - task: rollout-prd
      - task: git-tag

  release-stg:
    desc: "Build, push, and deploy staging from a branch (usage: task release-stg BRANCH=feat/my-feature)"
    vars:
      BRANCH: '{{.BRANCH | default "unknown"}}'
    cmds:
      - task: bump:build
      - task: build-stg
        vars:
          BRANCH: '{{.BRANCH}}'
      - task: push-stg
        vars:
          BRANCH: '{{.BRANCH}}'
      - task: build-ui-stg
        vars:
          BRANCH: '{{.BRANCH}}'
      - task: push-ui-stg
        vars:
          BRANCH: '{{.BRANCH}}'
      - task: stamp-stg
        vars:
          BRANCH: '{{.BRANCH}}'
      - task: apply-stg
      - task: rollout-stg

  stamp-stg:
    desc: "Write branch-derived image tags into stg kustomization.yaml (usage: task stamp-stg BRANCH=feat/my-feature)"
    vars:
      BRANCH: '{{.BRANCH | default "unknown"}}'
      TAG:
        sh: "echo stg-{{.BRANCH}} | tr '/' '-'"
    dir: kubernetes-manifests/envs/stg
    cmds:
      - kustomize edit set image {{.IMAGE}}:{{.TAG}}
      - kustomize edit set image {{.IMAGE_UI}}:{{.TAG}}

  rollout-dev:
    desc: Restart kio-api in kio-dev and wait for rollout
    cmds:
      - kubectl rollout restart deployment/kio-api -n kio-dev
      - kubectl rollout status deployment/kio-api -n kio-dev --timeout=120s

  rollout-prd:
    desc: Restart kio-api in kio and wait for rollout
    cmds:
      - kubectl rollout restart deployment/kio-api -n kio
      - kubectl rollout status deployment/kio-api -n kio --timeout=120s

  rollout-stg:
    desc: Restart kio-api and kio-ui in kio-stg and wait for rollout
    cmds:
      - kubectl rollout restart deployment/kio-api -n kio-stg
      - kubectl rollout restart deployment/kio-ui -n kio-stg
      - kubectl rollout status deployment/kio-api -n kio-stg --timeout=120s
      - kubectl rollout status deployment/kio-ui -n kio-stg --timeout=120s

  teardown-stg:
    desc: Delete the kio-api and kio-ui deployments from kio-stg
    cmds:
      - kubectl delete deployment kio-api kio-ui -n kio-stg --ignore-not-found

  stamp-prd:
    desc: Write the current version into the prd kustomization.yaml
    dir: kubernetes-manifests/envs/prd
    cmds:
      - kustomize edit set image {{.IMAGE}}:{{.VERSION}}
      - kustomize edit set image {{.IMAGE_UI}}:{{.VERSION}}

  version:
    desc: Show the current version and build number
    vars:
      BUILD:
        sh: cat BUILD
    cmds:
      - echo "v{{.VERSION}}+build.{{.BUILD}}"
