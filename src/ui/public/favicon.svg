<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- kio TV favicon -->
  <rect width="32" height="32" rx="6" fill="#0e1117"/>
  <!-- antennas -->
  <g stroke="#3b9eff" stroke-width="1.6" stroke-linecap="round" fill="none">
    <line x1="16" y1="11" x2="11" y2="5"/>
    <line x1="16" y1="11" x2="21" y2="5"/>
  </g>
  <!-- TV body -->
  <rect x="5.5" y="11" width="21" height="15" rx="2.5" fill="#1e2535" stroke="#3b9eff" stroke-width="1.6"/>
  <!-- screen -->
  <rect x="8" y="13.5" width="13" height="10" rx="1.2" fill="#3b9eff" opacity="0.9"/>
  <rect x="8" y="13.5" width="13" height="10" rx="1.2" fill="none" stroke="#0e1117" stroke-width="0.6"/>
  <!-- control knobs -->
  <circle cx="23.5" cy="15.5" r="1.2" fill="#e8edf5"/>
  <circle cx="23.5" cy="19.5" r="1.2" fill="#a8b4c8"/>
  <!-- speaker line -->
  <line x1="22.6" y1="22.5" x2="24.4" y2="22.5" stroke="#6b7a95" stroke-width="1.2" stroke-linecap="round"/>
</svg>
