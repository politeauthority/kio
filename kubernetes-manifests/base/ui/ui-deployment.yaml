apiVersion: apps/v1
kind: Deployment
metadata:
  name: kio-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kio-ui
  template:
    metadata:
      labels:
        app: kio-ui
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: harbor-registry
      containers:
        - name: kio-ui
          image: harbor.squid-ink.us/politeauthority/kio-ui:latest
          imagePullPolicy: Always
          # Image is nginxinc/nginx-unprivileged: master + workers run as uid 101
          # and listen on :8080. readOnlyRootFilesystem is intentionally NOT set —
          # the entrypoint rewrites runtime config into index.html on start.
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: API_URL
              value: /api
            - name: SHOW_FEATURE_FLAGS
              value: "True"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
