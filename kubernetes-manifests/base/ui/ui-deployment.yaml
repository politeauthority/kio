apiVersion: apps/v1
kind: Deployment
metadata:
  name: kio-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kio-ui
  template:
    metadata:
      labels:
        app: kio-ui
    spec:
      imagePullSecrets:
        - name: harbor-registry
      containers:
        - name: kio-ui
          image: harbor.squid-ink.us/politeauthority/kio-ui:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          env:
            - name: API_URL
              value: /api
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
