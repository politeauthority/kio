apiVersion: batch/v1
kind: Job
metadata:
  name: kio-migrate
  annotations:
    # Run `alembic upgrade head` before each ArgoCD sync rolls the API/UI, so the DB
    # schema is current before the new code serves. BeforeHookCreation deletes the prior
    # (immutable) Job so a new image can re-run it each sync. Under plain `kubectl apply`
    # (dev), these annotations are ignored and it behaves as an ordinary Job.
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: harbor-registry
      containers:
        - name: migrate
          image: harbor.squid-ink.us/politeauthority/kio-api:latest
          imagePullPolicy: Always
          command: ["alembic", "upgrade", "head"]
          workingDir: /app
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          envFrom:
            - secretRef:
                name: kio-api
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      volumes:
        - name: tmp
          emptyDir: {}
